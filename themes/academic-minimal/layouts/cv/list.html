{{ define "main" }}
<div class="container cv-page">
  <h1>{{ .Title }}</h1>
  <div class="cv-content" id="cv-content">
    {{ .Content }}
  </div>
</div>
<script>
(function() {
  const container = document.getElementById('cv-content');
  const children = Array.from(container.childNodes);
  const sections = [];
  let current = null;
  let preamble = [];

  children.forEach(node => {
    if (node.nodeType === 1 && node.tagName === 'H2') {
      if (current) sections.push(current);
      current = document.createElement('div');
      current.className = 'cv-section';
      current.appendChild(node);
    } else if (current) {
      current.appendChild(node);
    } else {
      preamble.push(node);
    }
  });
  if (current) sections.push(current);

  container.innerHTML = '';
  preamble.forEach(n => container.appendChild(n));
  sections.forEach(s => container.appendChild(s));
})();
</script>
{{ end }}
