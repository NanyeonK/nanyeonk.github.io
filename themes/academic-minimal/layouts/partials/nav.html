<header class="site-header">
  <div class="container">
    <nav class="site-nav">
      {{ $rel := .RelPermalink }}
      {{ range .Site.Menus.main }}
        {{ $active := false }}
        {{ if ne .URL "/" }}
          {{ $active = hasPrefix $rel .URL }}
        {{ end }}
        <a href="{{ .URL }}" class="{{ if $active }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
