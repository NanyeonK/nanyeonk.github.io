{{ define "main" }}
<div class="container blog-post">
  <article>
    <header class="blog-post-header">
      <h1>{{ .Title }}</h1>
      <time>{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }}
      <div class="blog-tags">
        {{ range . }}<a href="{{ "/blog/?tag=" | absURL }}{{ . | urlquery }}" class="tag tag-clickable" data-tag="{{ . }}">{{ . }}</a>{{ end }}
      </div>
      {{ end }}
    </header>
    <div class="blog-post-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
