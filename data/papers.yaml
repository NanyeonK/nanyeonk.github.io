  abstract: "This paper investigates when machine learning complexity pays off in housing market forecasting, and how the gains from cross-sectional pooling and nonlinearity interact across economic conditions. Using 51 US states with Zillow ZHVI and FRED-MD predictors, we decompose ML forecasting gains into pooling, nonlinearity, and interaction components under varying credit cycles and policy uncertainty regimes."
