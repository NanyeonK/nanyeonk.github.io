- title: "Bitcoin Forecasting with Machine Learning and On-Chain Information"
  coauthors: "with Hoseung Kang, Doojin Ryu, and Robert I. Webb"
  category: published
  venue: "Investment Analysts Journal"
  year: 2026
  url: "https://doi.org/10.1080/10293523.2026.2616575"
  tags:
    - Big Data
    - Machine Learning
    - Out-of-Sample Forecasting
    - Token Economics
  abstract: "This study evaluates machine learning models for forecasting daily Bitcoin returns using on-chain, macroeconomic, and market variables from January 2017 to December 2023. We implement a rolling-window framework with window lengths ranging from 365 to 730 days and compare several machine learning models against an autoregressive benchmark. Random Forest and Support Vector Machine achieve the lowest forecasting errors consistently across volatility regimes. Feature importance analysis using permutation importance and SHAP decomposition reveals that on-chain variables account for approximately 50 per cent of total forecasting contribution, with transaction fees and mining-related metrics ranking among the top important variables. Traditional market indicators such as VIX show limited relevance for Bitcoin return forecasting. These findings highlight the distinct informational value of blockchain-native variables for cryptocurrency forecasting."
  pdf: ""
  code: ""
  figure: ""

- title: "Uncertainty Indicators as Key Predictors of Oil Volatility: An Interpretable Machine Learning Approach"
  coauthors: "with Doojin Ryu and Robert I. Webb"
  category: published
  venue: "Computational Economics"
  year: 2026
  url: "https://doi.org/10.1007/s10614-025-11299-z"
  tags:
    - Big Data
    - Machine Learning
    - Out-of-Sample Forecasting
    - SHAP
  abstract: "We forecast monthly crude oil volatility dynamics using an interpretable machine learning framework applied to a long sample period from 1986 to 2023, encompassing multiple economic cycles, including four NBER-defined recessions, and incorporating 140 macroeconomic and uncertainty variables. Tree-based models (Random Forest and XGBoost) deliver the strongest out-of-sample forecasting performance, though their relative advantage varies across economic regimes. Uncertainty indicators, rather than oil-specific fundamentals, are the most influential predictors, indicating that oil volatility is primarily shaped by broader uncertainty conditions. Time-varying interpretability analyses reveal that the superior performance of tree-based models stems from their ability to flexibly combine multiple signals, an insight not captured by static importance scores. Our results highlight the value of dynamic interpretability in understanding regime-dependent machine learning behavior and offer guidance for volatility modeling."
  pdf: ""
  code: ""
  figure: ""

- title: "How Well Do Machine Learning Models in Finance Work?"
  coauthors: "with Doojin Ryu and Robert I. Webb"
  category: published
  venue: "Financial Innovation"
  year: 2025
  url: "https://doi.org/10.1186/s40854-025-00870-0"
  tags:
    - Asset Pricing
    - Machine Learning
    - Out-of-Sample Forecasting
    - SHAP
  abstract: "We examine how machine learning models predict stock returns in the Korean market. By analyzing various firm characteristics and macroeconomic variables, we find that tree-based models outperform other machine learning approaches. This finding suggests that, in data-constrained contexts, moderately complex models outperform advanced methods that require extensive datasets. Using PFI, SHAP, and LIME, we consistently identify the 36-month momentum as the key predictor. PDP, ICE, and ALE analyses reveal threshold effects of 36-month momentum that diminish at higher return levels. Our findings underscore the value of ensemble-based methods in settings characterized by short data histories and heightened volatility. This study illustrates how multimethod interpretability can yield deeper economic insights, ultimately guiding more effective investment strategies and policy decisions."
  pdf: ""
  code: ""
  figure: ""

- title: "Potential Pricing Factors in the Korean Market"
  coauthors: "with Jeongseok Bang and Doojin Ryu"
  category: published
  venue: "Finance Research Letters"
  year: 2024
  url: "https://doi.org/10.1016/j.frl.2024.105946"
  tags:
    - Asset Pricing
    - Factor Model
    - Machine Learning
  abstract: "This letter examines whether new factors have additional explanatory power for the cross-section of expected stock returns compared to existing factors. We exploit machine-learning-based double-section LASSO to select factors explaining the cross-section in the Korean stock market. Among the recently proposed factors, gross profitability consistently exhibits significant SDF loadings, as confirmed by several robustness checks."
